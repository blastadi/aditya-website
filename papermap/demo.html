<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PaperMap — the story</title>
<style>
  /* ---------- PaperMap story demo. One continuous dark canvas, never cuts. ----------
     Persistent layers morph across 8 beats; only the caption changes.
     pile (beats 0-3) -> map (beats 4-7). Teal is rationed: absent in beats 0-2,
     first appears on "the drop" (beat 3). Loop seam = a shared teal wash:
     beat 7 ends on it, beat 0 begins draining it. */
  :root{
    --bg:#070b11; --card:#111a25; --border:#1d2733; --border2:#2b3947;
    --text:#e6edf5; --muted:#9fb0c3; --faint:#6b7d92;
    --blue:#3b82f6; --teal:#5eead4;
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --ease:cubic-bezier(.22,.61,.36,1);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;background:var(--bg);overflow:hidden;}
  body{display:flex;align-items:center;justify-content:center;font-family:var(--font);}
  #fit{position:absolute;left:50%;top:50%;transform-origin:center center;}
  .stage{width:1280px;height:720px;position:relative;overflow:hidden;
    background:radial-gradient(820px 460px at 50% 44%,#0c1622 0%,var(--bg) 64%) no-repeat,var(--bg);}

  /* ---- caption ("voiceover") ---- */
  #cap{position:absolute;left:0;right:0;bottom:62px;z-index:40;text-align:center;color:var(--text);
    font-weight:650;letter-spacing:-.015em;line-height:1.34;padding:0 90px;font-size:30px;
    white-space:pre-line;pointer-events:none;opacity:0;transform:translateY(10px);transition:opacity .6s var(--ease),transform .6s var(--ease);}
  #cap.show{opacity:1;transform:none;}
  #cap.center{bottom:auto;top:50%;transform:translateY(-50%);font-size:38px;}
  #cap.center.show{transform:translateY(-50%);}
  #cap .sub{display:block;margin-top:7px;font-size:.74em;color:var(--text);font-weight:650;}
  #cap .files{display:block;margin-top:13px;color:var(--muted);font-family:ui-monospace,Menlo,monospace;
    font-size:17px;font-weight:500;line-height:1.7;letter-spacing:0;}

  /* ---- pile layer ---- */
  #pile{position:absolute;inset:0;z-index:20;transition:opacity .6s var(--ease),filter .8s ease;}
  #texture{position:absolute;inset:0;opacity:0;transition:opacity 1.8s ease;}
  .tcard{position:absolute;width:118px;height:78px;border-radius:8px;background:#0e1722;border:1px solid #18222f;}
  .card{position:absolute;background:var(--card);border:1px solid var(--border);border-radius:9px;
    width:150px;height:100px;padding:11px 12px;will-change:transform,opacity;}
  .card .t{height:8px;border-radius:4px;background:#34465a;width:78%;margin-bottom:8px;}
  .card .l{height:5px;border-radius:3px;background:#222e3c;margin-bottom:6px;}
  .card .l.s{width:55%;}
  .card .fn{position:absolute;left:12px;bottom:9px;right:12px;font-family:ui-monospace,Menlo,monospace;
    font-size:9px;color:var(--faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  #hero{width:200px;height:138px;z-index:3;left:50%;top:43%;transform:translate(-50%,-50%);}
  #hero .ttl{position:absolute;left:14px;top:13px;font-size:13px;font-weight:600;color:#aebccd;}
  #hero .seed{position:absolute;right:10px;top:10px;width:34px;height:34px;}

  /* ---- map layer ---- */
  #map{position:absolute;inset:0;z-index:21;opacity:0;transition:opacity .7s var(--ease);}
  #map svg{width:100%;height:100%;display:block;}
  .edge{stroke:var(--blue);stroke-opacity:.42;stroke-width:2;fill:none;}
  .nd{}

  /* ---- fx layer ---- */
  #fx{position:absolute;inset:0;z-index:30;pointer-events:none;}
  #dropzone{position:absolute;left:50%;top:45%;transform:translate(-50%,-50%);width:380px;height:228px;
    border:2px dashed var(--blue);border-radius:18px;opacity:0;transition:opacity .6s var(--ease);}
  #ripple{position:absolute;left:50%;top:45%;width:16px;height:16px;border-radius:50%;border:2px solid var(--teal);
    transform:translate(-50%,-50%) scale(1);opacity:0;}
  #searchbar{position:absolute;left:50%;top:38px;transform:translateX(-50%);width:520px;height:46px;
    border:1px solid var(--border2);border-radius:12px;background:rgba(17,26,37,.9);display:flex;align-items:center;
    gap:10px;padding:0 16px;color:var(--text);font-size:17px;font-weight:600;opacity:0;transition:opacity .5s var(--ease);}
  #sources{position:absolute;left:50%;top:96px;transform:translateX(-50%);display:flex;gap:8px;opacity:0;transition:opacity .5s;}
  #sources span{font-size:12px;font-weight:600;color:var(--faint);border:1px solid var(--border);border-radius:999px;padding:5px 11px;}
  #scanline{position:absolute;left:0;top:0;width:3px;height:100%;
    background:linear-gradient(90deg,transparent,rgba(94,234,212,.85),transparent);opacity:0;}
  #gapring{position:absolute;left:250px;top:430px;width:150px;height:150px;border-radius:50%;border:2px solid var(--teal);opacity:0;}
  #gaplabel{position:absolute;left:268px;top:592px;font-size:14px;font-weight:700;color:var(--teal);opacity:0;transition:opacity .6s;}
  #logo{position:absolute;left:50%;top:41%;transform:translate(-50%,-50%);width:150px;height:150px;opacity:0;
    transition:opacity .9s var(--ease);filter:drop-shadow(0 0 26px rgba(94,234,212,.45));}
  #wm{position:absolute;left:0;right:0;top:60%;text-align:center;font-size:48px;font-weight:800;color:var(--text);
    letter-spacing:-.03em;opacity:0;transition:opacity .7s var(--ease);}
  #tag{position:absolute;left:0;right:0;top:71%;text-align:center;font-size:22px;font-weight:600;opacity:0;
    transition:opacity .7s var(--ease);background:linear-gradient(120deg,var(--teal),var(--blue));
    -webkit-background-clip:text;background-clip:text;color:transparent;}
  #foot{position:absolute;left:0;right:0;top:80%;text-align:center;font-size:14px;font-weight:600;color:var(--faint);
    opacity:0;transition:opacity .7s var(--ease);}
  #wash{position:absolute;inset:0;z-index:50;background:var(--teal);opacity:0;}
  #cursor{position:absolute;left:50%;top:43%;width:3px;height:26px;background:var(--blue);transform:translate(118px,-50%);
    opacity:0;animation:blink 1s steps(1) infinite;}
  @keyframes blink{50%{opacity:0;}}
  #bar{position:absolute;left:0;bottom:0;height:2px;width:0;z-index:60;
    background:linear-gradient(90deg,var(--blue),var(--teal));opacity:.5;}
</style>
</head>
<body>
<div id="fit"><div class="stage" id="stage">
  <div id="pile"><div id="texture"></div></div>
  <div id="map"></div>
  <div id="fx">
    <div id="dropzone"></div><div id="ripple"></div>
    <div id="searchbar"><span style="color:var(--faint)">🔎</span><span>transformer attention</span></div>
    <div id="sources"><span>OpenAlex</span><span>Semantic Scholar</span><span>arXiv</span><span>CORE</span><span>PubMed</span></div>
    <div id="scanline"></div><div id="gapring"></div><div id="gaplabel">your contribution</div>
    <svg id="logo" viewBox="0 0 120 120"><path d="M20 92 L52 64 L80 78 L100 40" fill="none" stroke="#3b82f6" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/><circle cx="20" cy="92" r="7" fill="#3b82f6"/><circle cx="52" cy="64" r="7" fill="#3b82f6"/><circle cx="80" cy="78" r="7" fill="#3b82f6"/><circle cx="100" cy="40" r="10.5" fill="#5eead4"/></svg>
    <div id="wm">PaperMap</div><div id="tag">The gap that’s yours, finally in reach.</div>
    <div id="foot">offline · one window · $29 / year</div>
    <div id="cursor"></div>
    <div id="wash"></div>
  </div>
  <div id="cap"></div>
  <div id="bar"></div>
</div></div>

<script>
(function(){
  var fit=document.getElementById('fit');
  function resize(){var s=Math.min(window.innerWidth/1280,window.innerHeight/720);
    fit.style.transform='translate(-50%,-50%) scale('+s+')';}
  window.addEventListener('resize',resize);resize();

  var NS='http://www.w3.org/2000/svg';
  var pileEl=document.getElementById('pile'), mapEl=document.getElementById('map'), capEl=document.getElementById('cap');

  // ---------- build pile ----------
  var tex=document.getElementById('texture');
  for(var i=0;i<58;i++){var tc=document.createElement('div');tc.className='tcard';
    tc.style.left=(50+(i*89)%1090)+'px';tc.style.top=(118+((i*131)%470))+'px';
    tc.style.transform='rotate('+(((i*53)%24)-12)+'deg)';tc.style.opacity=(.22+((i%5)*.05));tex.appendChild(tc);}
  var FN=['lit_review_FINAL.pdf','lit_review_FINAL_v2.pdf','lit_review_FINAL_v3_REAL.pdf','untitled(7).pdf','MUST-READ.pdf','downloaded(3).pdf','notes_notes.pdf','smith_2019 (1).pdf','aaa_important.pdf','scan0007.pdf','draft_FINALfinal.pdf','refs_old.pdf'];
  var hero=document.createElement('div');hero.className='card';hero.id='hero';
  hero.innerHTML='<div class="ttl">A Review of the Field</div><div class="l" style="margin-top:34px"></div><div class="l"></div><div class="l s"></div>'+
    '<svg class="seed" viewBox="0 0 120 120"><path d="M20 92 L52 64 L80 78 L100 40" fill="none" stroke="#3b82f6" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" opacity=".85"/><circle cx="20" cy="92" r="7" fill="#3b82f6"/><circle cx="52" cy="64" r="7" fill="#3b82f6"/><circle cx="80" cy="78" r="7" fill="#3b82f6"/><circle cx="100" cy="40" r="9" fill="#33485e"/></svg>';
  pileEl.appendChild(hero);
  var pcards=[];
  for(var i=0;i<26;i++){var c=document.createElement('div');c.className='card';
    var rot=((i*47)%26)-13, cx=535+((i*61)%250)-15, cy=205+((i*97)%300);
    c.dataset.cx=cx;c.dataset.cy=cy;c.dataset.rot=rot;
    c.style.left=cx+'px';c.style.top=cy+'px';
    c.innerHTML='<div class="t"></div><div class="l"></div><div class="l s"></div><div class="fn">'+FN[i%FN.length]+'</div>';
    pileEl.appendChild(c);pcards.push(c);}

  // ---------- build map ----------
  var NODES=[[640,300,1],[500,250,0],[780,262,0],[420,400,0],[560,432,0],[720,420,0],[860,378,0],[470,520,0],[660,540,0],[840,500,0],[360,322,0],[902,300,0],[610,200,0],[762,162,0],[306,462,0],[940,460,0]];
  var HERO=[7,4,5,2,13]; // climbing route that becomes the logo
  var EDGES=[[0,1],[0,2],[0,4],[0,5],[1,12],[1,10],[2,11],[2,13],[3,4],[4,7],[5,8],[5,6],[6,9],[6,15],[3,14],[8,9],[7,8],[0,12],[5,2],[4,5]];
  var svg=document.createElementNS(NS,'svg');svg.setAttribute('viewBox','0 0 1280 720');
  var grp=document.createElementNS(NS,'g');svg.appendChild(grp);
  var edgeEls=[],nodeEls=[];
  EDGES.forEach(function(e){var a=NODES[e[0]],b=NODES[e[1]];var ln=document.createElementNS(NS,'line');
    ln.setAttribute('x1',a[0]);ln.setAttribute('y1',a[1]);ln.setAttribute('x2',b[0]);ln.setAttribute('y2',b[1]);
    ln.setAttribute('class','edge');var len=Math.hypot(b[0]-a[0],b[1]-a[1]);
    ln.style.strokeDasharray=len;ln.style.strokeDashoffset=len;ln._hero=(HERO.indexOf(e[0])>=0&&HERO.indexOf(e[1])>=0);
    grp.appendChild(ln);edgeEls.push(ln);});
  NODES.forEach(function(n,k){var c=document.createElementNS(NS,'circle');
    c.setAttribute('cx',n[0]);c.setAttribute('cy',n[1]);c.setAttribute('r',n[2]?22:(9+(k%3)*3));
    c.setAttribute('fill',n[2]?'#5eead4':'#3b82f6');c.setAttribute('class','nd');
    c.style.transformBox='fill-box';c.style.transformOrigin='center';c.style.transition='transform .7s var(--ease),opacity .5s var(--ease),filter .6s';
    c.style.transform='scale(0)';c.style.opacity='0';c._hub=!!n[2];c._hero=(HERO.indexOf(k)>=0);
    grp.appendChild(c);nodeEls.push(c);});
  mapEl.appendChild(svg);

  // ---------- timeline ----------
  var DUR=[8000,9000,7000,9000,15000,17000,11000,14000];
  var TOTAL=DUR.reduce(function(a,b){return a+b;},0);
  var starts=[];(function(){var t=0;DUR.forEach(function(d){starts.push(t);t+=d;});})();
  var bar=document.getElementById('bar');
  var $=function(id){return document.getElementById(id);};
  var timers=[];function clr(){timers.forEach(clearTimeout);timers=[];}
  function at(ms,fn){timers.push(setTimeout(fn,ms));}

  var CAP=[
    {t:'You started with one paper.',c:false},
    {t:'Then it multiplied.<span class="files">lit_review_FINAL.pdf\nlit_review_FINAL_v2.pdf\nlit_review_FINAL_v3_REAL.pdf</span>',c:false},
    {t:'Somewhere in here is your whole field.<span class="sub">You just can’t see it anymore.</span>',c:true},
    {t:'So you drop the whole mess in.<span class="sub">Then you let go.</span>',c:false},
    {t:'It reads every DOI. Merges the FINAL_v3s.<span class="sub">Gives every paper a place.</span>',c:false},
    {t:'And the lines you couldn’t see<span class="sub" style="color:var(--text)">draw themselves.</span>',c:false},
    {t:'Search every source at once.<span class="sub">Then spot the gap that’s yours.</span>',c:false},
    {t:'',c:false}
  ];
  function setCap(i){capEl.classList.remove('show');
    at(40,function(){capEl.className='cap'+(CAP[i].c?' center':'');capEl.innerHTML=CAP[i].t;
      capEl.className='cap'+(CAP[i].c?' center':'');void capEl.offsetWidth;capEl.classList.add('show');
      if(!CAP[i].t)capEl.classList.remove('show');});}

  function resetPile(){
    pileEl.style.opacity='1';pileEl.style.filter='none';
    hero.style.transition='none';hero.style.left='50%';hero.style.top='43%';
    hero.style.transform='translate(-50%,-50%)';hero.style.opacity='1';
    tex.style.transition='none';tex.style.opacity='0';
    pcards.forEach(function(c){c.style.transition='none';c.style.opacity='0';
      c.style.transform='translateY(-46px) rotate('+c.dataset.rot+'deg) scale(.96)';});
  }
  function hideMapInstant(){mapEl.style.opacity='0';
    nodeEls.forEach(function(c){c.style.transition='none';c.style.transform='scale(0)';c.style.opacity='0';c.style.filter='none';});
    edgeEls.forEach(function(e){e.style.transition='none';e.style.strokeDashoffset=e.style.strokeDasharray;e.style.opacity='1';});}

  function runBeat(i){
    clr();setCap(i);
    if(i>4){pileEl.style.transition='none';pileEl.style.opacity='0';} // map beats: pile is gone
    if(i===0){
      resetPile();hideMapInstant();
      ['dropzone','searchbar','sources','gaplabel','logo','wm','tag','foot'].forEach(function(id){$(id).style.opacity='0';});
      $('ripple').style.opacity='0';$('scanline').style.opacity='0';$('gapring').style.opacity='0';
      var w=$('wash');w.style.transition='opacity 1.2s var(--ease)';w.style.opacity='1';at(30,function(){w.style.opacity='0';});
      var cur=$('cursor');cur.style.opacity='0';at(900,function(){cur.style.transition='opacity .4s';cur.style.opacity='1';});
    }
    else if(i===1){
      $('cursor').style.opacity='0';
      tex.style.transition='opacity 1.8s ease';at(30,function(){tex.style.opacity='1';});
      pcards.forEach(function(c,k){var d=Math.min(150+k*(170-Math.min(k*4,130)),7200);
        at(d,function(){c.style.transition='opacity .4s var(--ease),transform .5s var(--ease)';c.style.opacity='1';
          c.style.transform='translateY(0) rotate('+c.dataset.rot+'deg) scale(1)';});});
    }
    else if(i===2){
      pileEl.style.filter='saturate(.82) brightness(.92)';
    }
    else if(i===3){
      pileEl.style.filter='none';
      var dz=$('dropzone');dz.style.opacity='0';at(250,function(){dz.style.opacity='1';});
      // gather: pull all cards toward the dropzone center, then freeze
      at(1400,function(){[hero].concat(pcards).forEach(function(c,k){
        c.style.transition='transform .9s var(--ease),opacity .9s var(--ease)';
        c.style.transform='translate('+(c===hero?'-50%,-50%':'0,0')+')';
        var tx=640-(parseFloat(c.dataset.cx||635)+75), ty=324-(parseFloat(c.dataset.cy||315)+50);
        if(c!==hero)c.style.transform='translate('+tx+'px,'+ty+'px) rotate(0deg) scale(.86)';});});
      at(4200,function(){var r=$('ripple');r.style.opacity='0';r.style.transform='translate(-50%,-50%) scale(1)';
        void r.offsetWidth;r.style.transition='opacity 1.1s var(--ease),transform 1.1s var(--ease)';
        r.style.opacity='.9';r.style.transform='translate(-50%,-50%) scale(34)';at(1100,function(){r.style.opacity='0';});});
    }
    else if(i===4){
      // pile dissolves; map nodes burst from center and lock
      pileEl.style.transition='opacity .6s var(--ease)';pileEl.style.opacity='0';$('dropzone').style.opacity='0';
      mapEl.style.opacity='1';
      nodeEls.forEach(function(c,k){c.style.transition='none';c.style.transform='scale(0)';c.style.opacity='0';});
      void mapEl.offsetWidth;
      nodeEls.forEach(function(c,k){at(300+k*230,function(){
        c.style.transition='transform .8s var(--ease),opacity .5s var(--ease)';c.style.transform='scale(1)';c.style.opacity='1';
        if(c._hub)c.style.filter='drop-shadow(0 0 12px rgba(94,234,212,.55))';});});
    }
    else if(i===5){
      mapEl.style.opacity='1';nodeEls.forEach(function(c){c.style.opacity='1';c.style.transform='scale(1)';});
      edgeEls.forEach(function(e,k){e.style.transition='none';e.style.strokeDashoffset=e.style.strokeDasharray;
        e.style.stroke=e._hero?'#5eead4':'#3b82f6';e.style.strokeOpacity=e._hero?'.85':'.42';void e.offsetWidth;
        at(300+k*120,function(){e.style.transition='stroke-dashoffset .9s var(--ease)';e.style.strokeDashoffset='0';});});
      nodeEls.forEach(function(c){if(c._hub)at(1700,function(){c.style.filter='drop-shadow(0 0 18px rgba(94,234,212,.75))';});});
    }
    else if(i===6){
      mapEl.style.opacity='1';
      nodeEls.forEach(function(c){c.style.opacity='1';c.style.transform='scale(1)';});
      edgeEls.forEach(function(e){e.style.strokeDashoffset='0';e.style.stroke=e._hero?'#5eead4':'#3b82f6';e.style.strokeOpacity=e._hero?'.85':'.42';});
      var sb=$('searchbar');sb.style.opacity='0';at(200,function(){sb.style.opacity='1';});
      var sc=$('sources');sc.style.opacity='0';at(600,function(){sc.style.opacity='1';});
      var sl=$('scanline');sl.style.transition='none';sl.style.left='0';sl.style.opacity='0';void sl.offsetWidth;
      at(900,function(){sl.style.opacity='1';sl.style.transition='left 2.6s var(--ease)';sl.style.left='100%';});
      at(3700,function(){sl.style.opacity='0';});
      var gr=$('gapring'),gl=$('gaplabel');gr.style.opacity='0';
      at(4900,function(){gr.style.transition='opacity .6s var(--ease)';gr.style.opacity='1';
        if(gr.animate)gr.animate([{transform:'scale(.9)'},{transform:'scale(1.07)'},{transform:'scale(1)'}],{duration:1300,easing:'ease-in-out'});
        gl.style.opacity='1';});
    }
    else if(i===7){
      $('searchbar').style.opacity='0';$('sources').style.opacity='0';$('gapring').style.opacity='0';$('gaplabel').style.opacity='0';
      // fade non-hero nodes/edges; keep hero path
      nodeEls.forEach(function(c){if(!c._hero){c.style.transition='opacity .8s var(--ease)';c.style.opacity='0';}});
      edgeEls.forEach(function(e){if(!e._hero){e.style.transition='opacity .8s var(--ease)';e.style.opacity='0';}});
      at(900,function(){mapEl.style.transition='opacity 1s var(--ease)';mapEl.style.opacity='0';});
      var lg=$('logo'),wm=$('wm'),tg=$('tag'),ft=$('foot');
      at(1000,function(){lg.style.opacity='1';});
      at(1700,function(){wm.style.opacity='1';});
      at(2400,function(){tg.style.opacity='1';});
      at(3000,function(){ft.style.opacity='1';});
      at(11500,function(){var w=$('wash');w.style.transition='opacity 2s var(--ease)';w.style.opacity='1';}); // bloom to loop wash
    }
  }

  var current=-1;
  function setBeat(i){if(i===current)return;current=i;runBeat(i);}

  var qs=new URLSearchParams(location.search);
  if(qs.has('scene')){var n=Math.max(0,Math.min(7,parseInt(qs.get('scene'),10)||0));setBeat(n);
    bar.style.width=((starts[n]+DUR[n]/2)/TOTAL*100)+'%';return;}
  var t0=performance.now();
  function loop(now){var t=(now-t0)%TOTAL;var idx=0;for(var k=0;k<starts.length;k++){if(t>=starts[k])idx=k;}
    setBeat(idx);bar.style.width=(t/TOTAL*100)+'%';requestAnimationFrame(loop);}
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
